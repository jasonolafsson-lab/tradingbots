# =============================================================================
# IBC Configuration — Headless IB Gateway for Options Bot
# =============================================================================
# IBC (IB Controller) auto-manages IB Gateway: login, dialog handling,
# reconnection — all without a monitor or keyboard.
# =============================================================================

# --- Login ---
FIX=no
IbLoginId=__IBKR_USERNAME__
IbPassword=__IBKR_PASSWORD__
TradingMode=paper

# --- Gateway Settings ---
# IBC manages IB Gateway (not TWS)
IbDir=/opt/ibgateway/current
GatewayAutoRestart=yes

# --- API Settings ---
AcceptIncomingConnectionAction=accept
AllowBlindTrading=yes
DismissPasswordExpiryWarning=yes
DismissNSEComplianceNotice=yes

# --- Auto-Accept Dialogs ---
AcceptNonBrokerageAccountWarning=yes
ExistingSessionDetectedAction=primaryoverride
OverrideTwsApiPort=7497
ReadOnlyLogin=no

# --- Connection Handling ---
ReloginAfterSecondFactorAuthenticationTimeout=yes
SecondFactorAuthenticationExitInterval=60

# --- Shutdown ---
# IB Gateway resets daily at 11:45 PM ET — IBC handles this automatically
ClosedownAt=

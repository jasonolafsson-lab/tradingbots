# --- Sector ETFs (tracked, not traded) ---
sector_etfs:
  - ticker: XLK
    sector: Technology
  - ticker: SOXX
    sector: Semiconductors
  - ticker: XLE
    sector: Energy
  - ticker: XLF
    sector: Financials
  - ticker: XLC
    sector: Communication Services

# --- Sector-to-Ticker Mapping ---
# Maps which watchlist tickers belong to which sector
sector_mapping:
  Technology:
    etf: XLK
    tickers: [QQQ]
  Semiconductors:
    etf: SOXX
    tickers: [NVDA]
  "EV / Growth":
    etf: null
    tickers: [TSLA]

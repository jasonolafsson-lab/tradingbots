# ============================================================
# Ticker Watchlist & Sector Groupings
# ============================================================

# --- V1 Trading Watchlist ---
watchlist:
  - ticker: SPY
    type: ETF
    sector: Broad Market
    expiry_schedule: daily       # 0DTE available every day
    spread_width: [2, 3]
  # QQQ, NVDA, TSLA disabled — SPY-only produces best backtest results
  # - ticker: QQQ
  #   type: ETF
  #   sector: Tech / Nasdaq
  #   expiry_schedule: daily
  #   spread_width: [2, 3]
  # - ticker: NVDA
  #   type: stock
  #   sector: Semiconductors
  #   expiry_schedule: weekly_mwf
  #   spread_width: 5
  # - ticker: TSLA
  #   type: stock
  #   sector: EV / Growth
  #   expiry_schedule: weekly_mwf
  #   spread_width: 5

